{% extends "layout.html" %}

{% block title %}Media4U{% endblock %}

{% block content %}
  <h2>
    Latest reviews
  </h2>
    {% for item in items %}
    <div class="option">
    <br/>
    <a href="/item/{{ item.id }}">{{ item.title }}</a>
    <p>
      {{ item.poster }} reviewed {{ item.work }}. Posted {{ item.time_posted }}
    </p>
    </div>
    <br/>
    {% endfor %}
  <p>
    <a href="/{{ page - 1 }}">&lt;&lt;</a>
    Sivu {{ page }}/{{ page_count }}
    <a href="/{{ page + 1 }}">&gt;&gt;</a>
  </p>
  <hr />
{% endblock %}
