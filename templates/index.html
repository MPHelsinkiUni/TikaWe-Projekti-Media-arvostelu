<!DOCTYPE html>
<html>

<head>
  <title>Etusivu</title>
</head>

<body>
  <h1>Etusivu</h1>
  <p>
    <b>Tervetuloa</b> <i>sovellukseen</i>!
  </p>

  <p>{{ message }}</p>
  <ul>
    {% for item in items %}
    <li>{{ item }}</li>
    {% endfor %}
  </ul>


  <form action="/result" method="post">
    <p>
      Anna viesti:
      <input type="text" name="message" />
    </p>
    <input type="submit" value="Lähetä" />
  </form>

</body>

</html>
