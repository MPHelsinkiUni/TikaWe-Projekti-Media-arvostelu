<!DOCTYPE html>
<html>

<head>
  <title>Profile: {{ user.username }}!</title>
</head>

<body>
  <h1>Welcome, {{ user.username }}!</h1>
  <p>ID: {{ user.user_id }}</p>
  
  <h2>Images</h2>
  {% for image in images %}
  <p>
    <img src="/image/{{ image.id }}" />
  </p>
  {% endfor %}

  <form action="/user/add_image" method="post" enctype="multipart/form-data">
    <p>
      Kuva: <input type="file" name="image" accept=".png" />
    </p>
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" /> 
    <input type="hidden" name="user_id" value="{{ session.user_id }}" /> 
    <input type="submit" value="Lähetä" />
  </form>

  <h2>Count</h2>
  <p>
    You have posted {{ entries | count }} review(s).
  </p>

  <h2>Reviews</h2>
  <ul>
    {% for entry in entries %}
    <li><a href="/item/{{ entry.id }}">{{ entry.title }}</a></li>
    {% endfor %}
  </ul>
  <p>
    <a href = "/"> Return to main page</a>
  </p>
</body>

</html>
